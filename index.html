<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body class="login-body">

<div class="login-box">

<div class="logo-text">
<h1>VIGNAN’S</h1>
<h5>FOUNDATION FOR SCIENCE, TECHNOLOGY & RESEARCH</h5>
<p>(Deemed to be University)</p>
</div>

<h3>Admin Login</h3>

<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>
<div class="link" onclick="forgotPassword()">Forgot Password?</div>

</div>

<script>
let pass = localStorage.getItem("adminPass") || "acse@123";

function login() {
if(username.value==="admin@acse" && password.value===pass){
window.location="dashboard.html";
}else alert("Wrong login");
}

function forgotPassword(){
let p=prompt("New password:");
if(p){localStorage.setItem("adminPass",p);alert("Reset done")}
}
</script>

</body>
</html>
